# Publishes this n8n community node package to npm on every version tag push.
#
# Starting May 1 2026, n8n requires all community nodes to be published via
# GitHub Actions with npm provenance statements. This workflow satisfies that
# requirement. Provenance lets anyone cryptographically verify that a package
# was built by this exact workflow, from this exact repository and commit.
#
# ─── PREREQUISITES ─────────────────────────────────────────────────────────────
#
# @n8n/node-cli >= 0.23.0 is required (this project pins ^0.35.0). Earlier
# versions do not support the provenance flag passed by `pnpm run release` in CI.
#
# ─── ONE-TIME SETUP ────────────────────────────────────────────────────────────
#
# Option A — OIDC Trusted Publishing (recommended, no long-lived secrets):
#   1. Log in to npmjs.com and open your package's settings.
#   2. Under "Publish access" → "Trusted Publishers", click "Add a publisher".
#   3. Select GitHub Actions and fill in:
#        Repository owner: Syndie-io
#        Repository name:  n8n-nodes-syndie
#        Workflow name:    publish.yml
#        Environment:      (leave blank unless you use GitHub Environments)
#   4. Leave the NPM_TOKEN secret unset — GitHub's OIDC token is used instead.
#
# Option B — npm Automation Token (fallback):
#   1. On npmjs.com: Access Tokens → Generate New Token → Granular Access Token,
#      scoped to this package with "Read and write" publish permission.
#   2. In GitHub: Settings → Secrets and variables → Actions → New secret,
#      named NPM_TOKEN.
#
# ─── RELEASE PROCESS ───────────────────────────────────────────────────────────
#
# Run `pnpm run release` locally to lint, build, bump the version, update the
# changelog, commit, tag, and push — which triggers this workflow.

name: Publish

on:
  push:
    tags:
      # Matches 0.1.0, 1.2.3, 2.0.0-rc.1, etc. Use 'v*.*.*' if you prefer a v prefix.
      - '*.*.*'

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    permissions:
      # Required to mint an OIDC token for npm provenance attestation.
      id-token: write
      # Scoped down from the default (write) for least-privilege publishing.
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Release
        # Publishes to npm with a provenance attestation (requires id-token: write).
        #
        # ── Method 1 (Option A — OIDC Trusted Publishing) — ACTIVE ──
        # The package now exists on npm and a Trusted Publisher is configured for
        # this repo + workflow, so no NPM_TOKEN is needed — GitHub's OIDC token
        # authenticates the publish. (Setup: npmjs.com → package settings →
        # Trusted Publishers → owner Syndie-io, repo n8n-nodes-syndie, workflow
        # publish.yml.)
        run: pnpm run release
       
